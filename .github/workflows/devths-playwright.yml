name: Devths-FE E2E 파이프라인
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for E2E tests'
        required: true
        default: 'https://stg.devths.com'
        type: string
  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: true
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm && pnpm install
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        env:
          BASE_URL: ${{ inputs.target_url || 'https://stg.devths.com' }}
        run: pnpm exec playwright test --reporter=json > result.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Parse Test Results
        id: results
        if: always()
        run: |
          if [ ! -f result.json ]; then
            echo "❌ result.json 파일이 생성되지 않았습니다."
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL=$(jq '.stats.expected' result.json || echo "0")
          PASSED=$(jq '.stats.expected - .stats.unexpected - .stats.skipped' result.json || echo "0")
          FAILED=$(jq '.stats.unexpected' result.json || echo "0")
          SKIPPED=$(jq '.stats.skipped' result.json || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      - name: Discord 알림 전송
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "🎭 E2E Test 결과 [${{ job.status == 'success' && '✅성공' || '❌실패' }}]"
          description: |
            **대상 URL**: ${{ inputs.target_url }}
            **실행자**: ${{ github.actor }}

            📊 **테스트 요약**
            - ✅ 성공: ${{ steps.results.outputs.passed }}
            - ❌ 실패: ${{ steps.results.outputs.failed }}
            - ⏭️ 건너뜀: ${{ steps.results.outputs.skipped }}
            (총 ${{ steps.results.outputs.total }}개 케이스)

            **🔗 링크**: [결과 리포트 확인하기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: "${{ job.status == 'success' && 65280 || 16711680 }}"
          username: Playwright E2E Bot
          avatar_url: https://playwright.dev/img/playwright-logo.svg
